<!DOCTYPE html>
<html lang="en">

<head>

<title>Renato Bisquera | Portfolio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
    scroll-snap-type: y mandatory;
}


body {
    margin: 0;
    background: #111;
    overflow-x: hidden;
}


/* slide */

.slide {

    height: 100vh;
    width: 100%;

    position: relative;

    display: flex;
    justify-content: center;
    align-items: center;

    scroll-snap-align: start;

}


.slide img {

    width: 100%;
    height: 100%;

    object-fit: cover;

}


/* invisible buttons */

.hotspot {

    position: absolute;

    cursor: pointer;

    z-index: 10;

}


/* EMAIL AREA */

.email {

    left: 14%;
    top: 60%;

    width: 250px;
    height: 40px;

}


/* PHONE AREA */

.phone {

    left: 14%;
    top: 66%;

    width: 200px;
    height: 40px;

}


/* hover effect */

.hotspot:hover {

    border: 1px solid rgba(255,255,255,.4);
    border-radius: 10px;

}


</style>

</head>


<body>


<!-- PAGE 1 -->

<div class="slide">

<img src="png1.png">


<a 
class="hotspot email"
href="mailto:bisquerajann@gmail.com">
</a>


<a
class="hotspot phone"
href="tel:+639952025463">
</a>


</div>



<!-- OTHER PAGES -->


<div class="slide">
<img src="png2.png">
</div>


<div class="slide">
<img src="png3.png">
</div>


<div class="slide">
<img src="png4.png">
</div>


<div class="slide">
<img src="png5.png">
</div>



</body>

</html>
