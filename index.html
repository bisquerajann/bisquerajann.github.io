<!DOCTYPE html>
<html lang="en">

<head>

<title>Renato Bisquera | Portfolio</title>



<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="portfolio_icon.png">
    
<style>

* {
    box-sizing: border-box;
}


html {
    scroll-behavior: smooth;
    scroll-snap-type: y mandatory;
}


body {

    margin: 0;
    padding: 0;

    background: #111;

    overflow-x: hidden;

}


/* each page */

.slide {

    height: 100vh;
    width: 100%;

    display: flex;
    justify-content: center;
    align-items: center;

    scroll-snap-align: start;

    overflow: hidden;

}


.slide img {

    width: 100%;
    height: 100%;

    object-fit: cover;

    opacity: 0;

    transform:
    scale(.92)
    translateY(60px);

    transition:

    opacity 1.3s ease,
    transform 1.3s ease;

}


/* show animation */

.slide.show img {

    opacity: 1;

    transform:
    scale(1)
    translateY(0);

}


/* first loading animation */

.slide:first-child img {

animation:
intro 1.5s ease forwards;

}


@keyframes intro {


from {

opacity:0;
transform:scale(.9);

}


to {

opacity:1;
transform:scale(1);

}

}


</style>


</head>



<body>



<div class="slide">
<img src="png1.png">
</div>


<div class="slide">
<img src="png2.png">
</div>


<div class="slide">
<img src="png3.png">
</div>


<div class="slide">
<img src="png4.png">
</div>


<div class="slide">
<img src="png5.png">
</div>





<script>


const slides = document.querySelectorAll(".slide");


const observer = new IntersectionObserver(entries => {


entries.forEach(entry => {


if(entry.isIntersecting){

entry.target.classList.add("show");

}


});


}, {

threshold: .5

});


slides.forEach(slide => {

observer.observe(slide);

});


</script>


</body>


</html>
